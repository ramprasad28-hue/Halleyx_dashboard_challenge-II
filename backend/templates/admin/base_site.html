{% extends "admin/base.html" %}

{% block extrahead %}
{{ block.super }}
<style>
/* LIGHT is default Django admin — we add DARK mode */
body.dark-theme {
  --primary: #4f7bff;
  background: #0f1117 !important;
  color: #f0f2f8 !important;
}
body.dark-theme #header {
  background: #13151c !important;
  color: #f0f2f8 !important;
}
body.dark-theme #header a:link,
body.dark-theme #header a:visited {
  color: #f0f2f8 !important;
}
body.dark-theme .module h2,
body.dark-theme .module caption,
body.dark-theme .inline-group h2 {
  background: #1a1d27 !important;
  color: #f0f2f8 !important;
}
body.dark-theme #content {
  background: #0f1117 !important;
  color: #f0f2f8 !important;
}
body.dark-theme .module {
  background: #1a1d27 !important;
  border: 1px solid rgba(255,255,255,0.07) !important;
}
body.dark-theme #nav-sidebar {
  background: #13151c !important;
}
body.dark-theme #nav-sidebar a {
  color: #8b92a9 !important;
}
body.dark-theme tr:nth-child(odd) {
  background: #1a1d27 !important;
}
body.dark-theme tr:nth-child(even) {
  background: #13151c !important;
}
body.dark-theme td, body.dark-theme th {
  color: #f0f2f8 !important;
  border-color: rgba(255,255,255,0.07) !important;
}
body.dark-theme a:link, body.dark-theme a:visited {
  color: #4f7bff !important;
}
body.dark-theme input, body.dark-theme select, body.dark-theme textarea {
  background: #21263a !important;
  color: #f0f2f8 !important;
  border-color: rgba(255,255,255,0.12) !important;
}
body.dark-theme .submit-row {
  background: #1a1d27 !important;
  border-color: rgba(255,255,255,0.07) !important;
}
body.dark-theme .breadcrumbs {
  background: #13151c !important;
  color: #8b92a9 !important;
}
body.dark-theme .breadcrumbs a {
  color: #4f7bff !important;
}
body.dark-theme #changelist-filter {
  background: #1a1d27 !important;
}
body.dark-theme #changelist-filter h2,
body.dark-theme #changelist-filter h3 {
  background: #13151c !important;
  color: #f0f2f8 !important;
}
body.dark-theme .paginator {
  background: #1a1d27 !important;
  color: #8b92a9 !important;
}
body.dark-theme #toolbar {
  background: #13151c !important;
  border-color: rgba(255,255,255,0.07) !important;
}
body.dark-theme #searchbar {
  background: #21263a !important;
  color: #f0f2f8 !important;
  border-color: rgba(255,255,255,0.12) !important;
}

/* THEME TOGGLE BUTTON */
#theme-btn {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: #4f7bff;
  color: white;
  border: none;
  font-size: 20px;
  cursor: pointer;
  z-index: 9999;
  box-shadow: 0 4px 16px rgba(79,123,255,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .2s;
}
#theme-btn:hover {
  transform: scale(1.1);
  box-shadow: 0 6px 20px rgba(79,123,255,0.5);
}
</style>

<script>
// Apply saved theme immediately to avoid flash
(function() {
  if (localStorage.getItem('admin-theme') === 'dark') {
    document.body.classList.add('dark-theme');
  }
})();
</script>
{% endblock %}

{% block usertools %}
{{ block.super }}
<!-- Theme toggle button in header -->
<button onclick="toggleAdminTheme()" id="header-theme-btn"
  style="
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    padding: 4px 12px;
    color: white;
    cursor: pointer;
    font-size: 14px;
    margin-right: 10px;
    vertical-align: middle;
  ">
  🌙 Theme
</button>
{% endblock %}

{% block footer %}
{{ block.super }}
<!-- Floating theme button -->
<button id="theme-btn" onclick="toggleAdminTheme()">🌙</button>

<script>
function toggleAdminTheme() {
  const body = document.body;
  const floatBtn = document.getElementById('theme-btn');
  const headerBtn = document.getElementById('header-theme-btn');
  const isDark = body.classList.contains('dark-theme');

  if (isDark) {
    body.classList.remove('dark-theme');
    if (floatBtn) floatBtn.textContent = '🌙';
    if (headerBtn) headerBtn.textContent = '🌙 Theme';
    localStorage.setItem('admin-theme', 'light');
  } else {
    body.classList.add('dark-theme');
    if (floatBtn) floatBtn.textContent = '☀️';
    if (headerBtn) headerBtn.textContent = '☀️ Theme';
    localStorage.setItem('admin-theme', 'dark');
  }
}

// Set correct icon on load
window.addEventListener('DOMContentLoaded', function() {
  const isDark = localStorage.getItem('admin-theme') === 'dark';
  const floatBtn = document.getElementById('theme-btn');
  const headerBtn = document.getElementById('header-theme-btn');
  if (isDark) {
    if (floatBtn) floatBtn.textContent = '☀️';
    if (headerBtn) headerBtn.textContent = '☀️ Theme';
  }
});
</script>
{% endblock %}
