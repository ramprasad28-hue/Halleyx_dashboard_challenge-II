<!DOCTYPE html>
<html>
<head>
<title>Orders</title>
<style>

body{
    background:#f4f6f9;
    font-family:Arial;
    margin:0;
}

.navbar{
    background:#1f2937;
    padding:15px 30px;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin-right:25px;
    font-weight:bold;
}

.container{
    padding:30px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
    margin-bottom:25px;
}

h2{
    margin-top:0;
}

table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    padding:12px;
    text-align:left;
}

th{
    background:#f1f5f9;
}

tr:nth-child(even){
    background:#f9fafb;
}

tr:hover{
    background:#eef2ff;
}

.upload-box{
    display:flex;
    gap:10px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

</style>

</head>

<body>
<div class="navbar">
    <a href="/dashboard/">Dashboard</a>
    <a href="/orders/">Orders</a>
</div>
<br>
<div class="top-bar">

<form action="/api/upload-orders/" method="post" enctype="multipart/form-data">
{% csrf_token %}
<input type="file" name="file">
<button type="submit">Upload CSV</button>
</form>

</div>

<table>

<tr>
<th>Customer</th>
<th>Product</th>
<th>Quantity</th>
<th>Total</th>
<th>Status</th>
</tr>

{% for order in orders %}

<tr>
<td>{{order.first_name}} {{order.last_name}}</td>
<td>{{order.product}}</td>
<td>{{order.quantity}}</td>
<td>{{order.total_amount}}</td>
<td>{{order.status}}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
