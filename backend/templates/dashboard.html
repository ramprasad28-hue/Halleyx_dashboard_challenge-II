{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Halleyx</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --sidebar-bg: #13151c;
  --surface: #1a1d27;
  --surface2: #21263a;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text-primary: #f0f2f8;
  --text-secondary: #8b92a9;
  --text-muted: #555e7a;
  --accent: #4f7bff;
  --accent-glow: rgba(79,123,255,0.15);
  --success: #22c55e;
  --success-bg: rgba(34,197,94,0.1);
  --warning: #f59e0b;
  --warning-bg: rgba(245,158,11,0.1);
  --danger: #ef4444;
  --font: 'Plus Jakarta Sans', sans-serif;
  --sidebar-w: 220px;
  --radius: 10px;
  --radius-lg: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text-primary); display: flex; min-height: 100vh; font-size: 14px; }

/* SIDEBAR */
.sidebar { width: var(--sidebar-w); background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; padding: 0 12px; }
.sidebar-logo { padding: 22px 8px 20px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
.logo-text { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.nav-label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; padding: 8px 8px 6px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: var(--radius); color: var(--text-secondary); text-decoration: none; font-size: 13px; font-weight: 500; transition: all .18s; margin-bottom: 2px; }
.nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }
.nav-item.active { background: var(--accent-glow); color: var(--accent); }

/* MAIN */
.main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; }

/* TOPBAR */
.topbar { background: var(--sidebar-bg); border-bottom: 1px solid var(--border); padding: 0 28px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
.topbar h1 { font-size: 16px; font-weight: 700; }
.topbar p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.topbar-right { display: flex; gap: 10px; align-items: center; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius); border: none; cursor: pointer; font-size: 13px; font-weight: 600; font-family: var(--font); transition: all .18s; text-decoration: none; }
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: #3d67f0; transform: translateY(-1px); }
.select-filter { background: var(--surface2); border: 1px solid var(--border2); color: var(--text-primary); padding: 8px 12px; border-radius: var(--radius); font-family: var(--font); font-size: 13px; cursor: pointer; outline: none; }

/* CONTENT */
.content { padding: 24px 28px; }

/* EMPTY STATE */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; color: var(--text-muted); }
.empty-icon { font-size: 48px; margin-bottom: 16px; opacity: .4; }
.empty-state h2 { font-size: 18px; font-weight: 700; color: var(--text-secondary); margin-bottom: 8px; }
.empty-state p { font-size: 13px; margin-bottom: 20px; line-height: 1.6; }

/* WIDGET GRID */
.widgets-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 16px; }

/* WIDGET CARD */
.widget-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; transition: border-color .18s; overflow: hidden; }
.widget-card:hover { border-color: var(--border2); }
.widget-card-title { font-size: 13px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
.widget-card-sub { font-size: 11px; color: var(--text-muted); margin-bottom: 16px; }

/* KPI */
.kpi-value { font-size: 36px; font-weight: 700; line-height: 1; margin-top: 8px; }
.kpi-label { font-size: 11px; color: var(--text-muted); margin-top: 6px; }

/* CHART CONTAINER */
.chart-container { position: relative; height: 260px; }

/* TABLE */
.widget-table { width: 100%; border-collapse: collapse; margin-top: 4px; }
.widget-table th { padding: 9px 12px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: white; }
.widget-table td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid var(--border); color: var(--text-secondary); }
.widget-table tr:last-child td { border-bottom: none; }
.widget-table tr:hover td { background: rgba(255,255,255,0.02); }

/* STATUS BADGES */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; }
.badge-pending { background: var(--warning-bg); color: var(--warning); }
.badge-pending::before { background: var(--warning); }
.badge-in_progress { background: var(--accent-glow); color: var(--accent); }
.badge-in_progress::before { background: var(--accent); }
.badge-completed { background: var(--success-bg); color: var(--success); }
.badge-completed::before { background: var(--success); }

/* LOADING SKELETON */
.skeleton { background: linear-gradient(90deg, var(--surface2) 25%, rgba(255,255,255,0.05) 50%, var(--surface2) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; }
@keyframes shimmer { 0% { background-position: 200% 0 } 100% { background-position: -200% 0 } }

/* TOAST */
.toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); padding: 12px 18px; display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 500; box-shadow: 0 8px 32px rgba(0,0,0,0.4); animation: slideUp .2s ease; transition: opacity .3s; }
.toast.hide { opacity: 0; }
.toast-success { border-left: 3px solid var(--success); }
.toast-error { border-left: 3px solid var(--danger); }
@keyframes slideUp { from { opacity:0; transform:translateY(12px) } to { opacity:1; transform:translateY(0) } }

/* RESPONSIVE */
@media (max-width: 1024px) {
  .widgets-grid { grid-template-columns: repeat(8, 1fr); }
}
/* REPLACE */
@media (max-width: 640px) {
  .main { margin-left: 0 !important; }
  .sidebar {
    transform: translateX(-100%);
    transition: transform .25s ease;
    z-index: 999;
  }
  .sidebar.open { transform: translateX(0); }
  .widgets-grid { grid-template-columns: repeat(4, 1fr); }
  .content { padding: 16px; }
  .hamburger { display: block !important; }
}

/* MOBILE HAMBURGER */
.hamburger {
  display: none;
  background: none;
  border: none;
  color: var(--text-primary);
  font-size: 20px;
  cursor: pointer;
  padding: 4px 8px;
}

@media (max-width: 768px) {
  .sidebar {
    transform: translateX(-100%);
    transition: transform .25s ease;
    z-index: 999;
  }
  .sidebar.open {
    transform: translateX(0);
  }
  .main {
    margin-left: 0 !important;
  }
  .hamburger {
    display: block;
  }
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 998;
  }
  .sidebar-overlay.show {
    display: block;
  }
}
/* LIGHT THEME */
body.light {
  --bg: #f4f6fb;
  --sidebar-bg: #ffffff;
  --surface: #ffffff;
  --surface2: #f0f2f8;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.15);
  --text-primary: #0f1117;
  --text-secondary: #4a5068;
  --text-muted: #8b92a9;
  --accent: #4f7bff;
  --accent-glow: rgba(79,123,255,0.12);
  --success: #16a34a;
  --success-bg: rgba(22,163,74,0.1);
  --warning: #d97706;
  --warning-bg: rgba(217,119,6,0.1);
  --danger: #dc2626;
  --danger-bg: rgba(220,38,38,0.1);
}

/* THEME BUTTON */
.theme-btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 2px solid var(--border2);
  background: var(--surface2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .2s;
  flex-shrink: 0;
  padding: 0;
}
.theme-btn:hover {
  border-color: var(--accent);
  transform: scale(1.08);
}
.theme-btn:active {
  transform: scale(0.95);
}
.theme-btn svg {
  width: 20px;
  height: 20px;
  transition: all .2s;
}
.theme-btn .sun-icon { display: none; stroke: var(--text-primary); fill: none; stroke-width: 2; stroke-linecap: round; }
.theme-btn .moon-icon { display: block; fill: var(--text-primary); }
body.light .theme-btn .sun-icon { display: block; }
body.light .theme-btn .moon-icon { display: none; }
@media (max-width: 768px) {
  .topbar { padding: 0 14px; height: auto; min-height: 60px; }
  .topbar p { display: none; }
  .topbar h1 { font-size: 14px !important; }
  .topbar-right { gap: 6px !important; }
  .select-filter { font-size: 12px; padding: 6px 8px; max-width: 110px; }
  .content { padding: 16px; }

  /* KPI cards — 2 per row */
  div[style*="repeat(3,1fr)"],
  div[style*="repeat(4,1fr)"] {
    grid-template-columns: 1fr 1fr !important;
  }

  /* Charts — stack vertically */
  div[style*="minmax(460px"] {
    grid-template-columns: 1fr !important;
  }

  .kpi-value { font-size: 26px !important; }
  .widget-card { padding: 14px; }
  .chart-container { height: 200px !important; }
}

.sidebar-logo-img {
  height: 36px;
  width: auto;
  object-fit: contain;
  /* Dark mode — make logo white */
  filter: brightness(0) invert(1);
  transition: filter .2s;
  background-color:transparent;
}

body.light .sidebar-logo-img {
  /* Light mode — show original colors with shadow to pop */
  filter: drop-shadow(0 0 2px rgb(10, 3, 3));
}

</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
  <div class="logo-text">
    <img src="/static/images/halleyx-logo.png" 
  alt="Halleyx" 
  class="sidebar-logo-img">
  </div>
</div>
  <div class="nav-label">Menu</div>
  <a href="/dashboard/" class="nav-item active">▦ Dashboard</a>
  <a href="/orders/" class="nav-item">📋 Orders</a>
  <a href="/configure/" class="nav-item">⚙️ Configure</a>
</aside>

<!-- MAIN -->
<main class="main">
<!-- MOBILE OVERLAY (closes sidebar when clicking outside) -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
  <!-- TOPBAR -->
  <div class="topbar">
    <!-- ADD as first child inside topbar div -->
<button class="hamburger" onclick="toggleSidebar()">☰</button>
    <div>
      <h1>Dashboard</h1>
      <p>Sales analytics overview</p>
    </div>
    <div class="topbar-right">
      <button class="theme-btn" onclick="toggleTheme()" title="Toggle theme">
  <!-- Moon icon — shows in dark mode -->
  <svg class="moon-icon" viewBox="0 0 24 24">

  </svg>
  <!-- Sun icon — shows in light mode -->
  <svg class="sun-icon" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="5"/>
    <line x1="12" y1="1" x2="12" y2="3"/>
    <line x1="12" y1="21" x2="12" y2="23"/>
    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
    <line x1="1" y1="12" x2="3" y2="12"/>
    <line x1="21" y1="12" x2="23" y2="12"/>
    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
  </svg>
</button>
      <select class="select-filter" id="dateFilter" onchange="applyFilter()">
        <option value="all">All time</option>
        <option value="today">Today</option>
        <option value="7">Last 7 days</option>
        <option value="30">Last 30 days</option>
        <option value="90">Last 90 days</option>
      </select>
      <a href="/configure/" class="btn btn-primary">⚙️ Configure</a>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content" id="dashboardContent">
    <!-- filled by JS -->
    <div style="display:flex;align-items:center;justify-content:center;min-height:60vh">
      <div style="text-align:center;color:var(--text-muted)">
        <div style="font-size:32px;margin-bottom:12px">⏳</div>
        <div style="font-size:14px">Loading dashboard...</div>
      </div>
    </div>
  </div>

</main>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let orderData = [];
let chartInstances = {};
let savedConfigs = {};

// ── Boot ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function () {
  // Load orders + layout in parallel
  Promise.all([
    fetch('/api/orders/').then(r => r.json()),
    fetch('/api/load-layout/').then(r => r.json())
  ])
  .then(([orders, layout]) => {
    orderData = orders;
    if (layout && layout.configs && Object.keys(layout.configs).length > 0) {
      savedConfigs = layout.configs;
      renderDashboard(savedConfigs);
    } else {
      showEmptyState();
    }
  })
  .catch(() => showEmptyState());
});

// ── Apply date filter — re-render all widgets ─────────────────────────────────
function applyFilter() {
  const range = document.getElementById('dateFilter').value;

  // Destroy all existing charts
  Object.values(chartInstances).forEach(c => c.destroy());
  chartInstances = {};
  const now=new Date();
  let filtered=[...orderData];

  if(range==='today'){
    filtered = orderData.filter(o => {
      const d = new Date(o.created_at);
      return d.toDateString() === now.toDateString();
    });
  } else if (range === '7') {
    const cutoff = new Date(now - 7 * 24 * 60 * 60 * 1000);
    filtered = orderData.filter(o => new Date(o.created_at) >= cutoff);
  } else if (range === '30') {
    const cutoff = new Date(now - 30 * 24 * 60 * 60 * 1000);
    filtered = orderData.filter(o => new Date(o.created_at) >= cutoff);
  } else if (range === '90') {
    const cutoff = new Date(now - 90 * 24 * 60 * 60 * 1000);
    filtered = orderData.filter(o => new Date(o.created_at) >= cutoff);
  }
  const temp=orderData;
  orderData=filtered;
  renderDashboard(savedConfigs);
  orderData=temp;
  }
     

// ── Render full dashboard from configs ───────────────────────────────────────
function renderDashboard(configs) {
  
  const content = document.getElementById('dashboardContent');
  const widgets = Object.values(configs);

  // Separate KPIs from others
  const kpis = widgets.filter(w => w.type === 'kpi');
  const others = widgets.filter(w => w.type !== 'kpi');

  let html = '';

  // KPI row — always full width, up to 4 per row
  if (kpis.length > 0) {
    html += `<div style="display:grid;grid-template-columns:repeat(${Math.min(kpis.length, 4)},1fr);gap:16px;margin-bottom:20px">`;
    kpis.forEach((cfg, i) => {
      html += `<div class="widget-card" id="kpi-${i}">
        <div class="widget-card-title">${cfg.title}</div>
        <div class="widget-card-sub">${cfg.aggregation ? cfg.aggregation.toUpperCase() + ' · ' + cfg.metric : ''}</div>
        <div class="kpi-value" id="kpi-val-${i}" style="color:${kpiColor(i)}">
          <div class="skeleton" style="height:40px;width:120px"></div>
        </div>
        <div class="kpi-label" id="kpi-sub-${i}"></div>
      </div>`;
    });
    html += `</div>`;
  }

  // Charts + Table — 2 columns
  if (others.length > 0) {
    html += `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(460px,1fr));gap:16px">`;
    others.forEach((cfg, i) => {
      const wid = 'widget-' + i;
      if (cfg.type === 'table') {
        html += `<div class="widget-card" id="${wid}" style="grid-column:1/-1">
          <div class="widget-card-title">${cfg.title}</div>
          <div class="widget-card-sub">Orders table</div>
          <div id="body-${wid}"><div class="skeleton" style="height:200px"></div></div>
        </div>`;
      } else {
        html += `<div class="widget-card" id="${wid}">
          <div class="widget-card-title">${cfg.title}</div>
          <div class="widget-card-sub">${getChartSubtitle(cfg)}</div>
          <div class="chart-container">
            <canvas id="canvas-${wid}"></canvas>
          </div>
        </div>`;
      }
    });
    html += `</div>`;
  }

  content.innerHTML = html;

  // Now render values
  kpis.forEach((cfg, i) => renderKPI(cfg, i));
  others.forEach((cfg, i) => {
    const wid = 'widget-' + i;
    if (cfg.type === 'table') renderTable(cfg, wid);
    else renderChart(cfg, wid);
  });
}

// ── KPI ───────────────────────────────────────────────────────────────────────
function renderKPI(cfg, i) {
  let value = 0;
  const field = cfg.metric || 'total_amount';

  if (cfg.aggregation === 'count') {
    value = orderData.length;
  } else if (cfg.aggregation === 'sum') {
    value = orderData.reduce((s, o) => s + parseFloat(o[field] || 0), 0);
  } else if (cfg.aggregation === 'avg') {
    value = orderData.length
      ? orderData.reduce((s, o) => s + parseFloat(o[field] || 0), 0) / orderData.length
      : 0;
  }

  const precision = cfg.precision || 0;
  const formatted = cfg.format === 'currency'
    ? '₹' + value.toFixed(precision).replace(/\B(?=(\d{3})+(?!\d))/g, ',')
    : value.toFixed(precision);

  const el = document.getElementById('kpi-val-' + i);
  const sub = document.getElementById('kpi-sub-' + i);
  if (el) el.innerHTML = formatted;
  if (sub) sub.textContent = orderData.length + ' orders in range';
}

// ── CHART ─────────────────────────────────────────────────────────────────────
function renderChart(cfg, wid) {
  const canvas = document.getElementById('canvas-' + wid);
  if (!canvas) return;

  // Group data
  const grouped = {};
  orderData.forEach(o => {
    const xVal = o[cfg.xAxis] || 'Unknown';
    const yVal = parseFloat(o[cfg.yAxis]) || 0;
    grouped[xVal] = (grouped[xVal] || 0) + yVal;
  });

  const labels = Object.keys(grouped);
  const values = Object.values(grouped);
  const color = cfg.color || '#4f7bff';

  // Chart type mapping
  const typeMap = {
    bar_chart: 'bar',
    line_chart: 'line',
    area_chart: 'line',
    scatter_chart: 'scatter',
    pie_chart: 'doughnut',
  };
  const chartType = typeMap[cfg.type] || 'bar';

  // Pie / doughnut config
  if (cfg.type === 'pie_chart') {
    const pieGrouped = {};
    orderData.forEach(o => {
      const key = o[cfg.chartData || 'status'] || 'Unknown';
      pieGrouped[key] = (pieGrouped[key] || 0) + 1;
    });
    const pieLabels = Object.keys(pieGrouped);
    const pieValues = Object.values(pieGrouped);
    const colors = ['#4f7bff','#22c55e','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#f97316'];

    chartInstances[wid] = new Chart(canvas, {
      type: 'doughnut',
      data: {
        labels: pieLabels,
        datasets: [{ data: pieValues, backgroundColor: colors.slice(0, pieLabels.length), borderWidth: 0, hoverOffset: 6 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '60%',
        plugins: {
          legend: cfg.showLegend !== false
            ? { position: 'bottom', labels: { color: '#8b92a9', font: { size: 11 }, padding: 12 } }
            : { display: false }
        }
      }
    });
    return;
  }

  // Axis charts
  const dataset = {
    label: cfg.yAxis || 'Value',
    data: chartType === 'scatter'
      ? labels.map((l, i) => ({ x: i, y: values[i] }))
      : values,
    backgroundColor: color + 'aa',
    borderColor: color,
    borderWidth: 2,
    borderRadius: chartType === 'bar' ? 6 : 0,
    fill: cfg.type === 'area_chart',
    tension: 0.4,
    pointRadius: chartType === 'scatter' ? 5 : 3,
  };

  chartInstances[wid] = new Chart(canvas, {
    type: chartType,
    data: { labels, datasets: [dataset] },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#8b92a9', font: { size: 11, family: 'Plus Jakarta Sans' } } }
      },
      scales: chartType !== 'scatter' ? {
        x: { ticks: { color: '#555e7a', font: { size: 11 } }, grid: { color: 'rgba(255,255,255,0.04)' } },
        y: { ticks: { color: '#555e7a', font: { size: 11 } }, grid: { color: 'rgba(255,255,255,0.04)' } }
      } : {}
    }
  });
}

// ── TABLE ─────────────────────────────────────────────────────────────────────
function renderTable(cfg, wid) {
  const body = document.getElementById('body-' + wid);
  if (!body) return;

  const cols = cfg.columns || ['first_name', 'last_name', 'product', 'status', 'total_amount'];
  let data = [...orderData];

  if (cfg.sortBy === 'asc') data.sort((a, b) => parseFloat(a.total_amount) - parseFloat(b.total_amount));
  else if (cfg.sortBy === 'desc') data.sort((a, b) => parseFloat(b.total_amount) - parseFloat(a.total_amount));

  const limit = parseInt(cfg.pagination) || 10;
  const headerBg = cfg.headerBg || '#54bd95';
  const fontSize = cfg.fontSize || 14;

  // Store full data for filtering
  window['tableData_' + wid] = data;

  body.innerHTML = `
    <!-- Filter row -->
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <input 
        id="tf-search-${wid}"
        type="text" 
        placeholder="🔍 Search table..."
        oninput="filterWidget('${wid}')"
        style="flex:1;padding:7px 10px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text-primary);font-size:12px;font-family:var(--font);outline:none;min-width:120px"
      >
      <select 
        id="tf-status-${wid}"
        onchange="filterWidget('${wid}')"
        style="padding:7px 10px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text-primary);font-size:12px;font-family:var(--font);outline:none;cursor:pointer"
      >
        <option value="">All Status</option>
        <option value="pending">Pending</option>
        <option value="in_progress">In Progress</option>
        <option value="completed">Completed</option>
      </select>
    </div>
    <!-- Table -->
    <div style="overflow-x:auto" id="tf-table-${wid}">
      ${buildTableHTML(data.slice(0, limit), cols, headerBg, fontSize)}
    </div>
    <div style="font-size:11px;color:var(--text-muted);margin-top:8px" id="tf-count-${wid}">
      Showing ${Math.min(limit, data.length)} of ${data.length} orders
    </div>
  `;
}

function filterWidget(wid) {
  const q = document.getElementById('tf-search-' + wid)?.value.toLowerCase() || '';
  const s = document.getElementById('tf-status-' + wid)?.value || '';
  const cfg = Object.values(savedConfigs).find(c => c.type === 'table') || {};
  const limit = parseInt(cfg.pagination) || 10;
  const cols = cfg.columns || ['first_name','last_name','product','status','total_amount'];
  const headerBg = cfg.headerBg || '#54bd95';
  const fontSize = cfg.fontSize || 14;

  let data = window['tableData_' + wid] || [];
  data = data.filter(o =>
    (!q || `${o.first_name} ${o.last_name} ${o.product} ${o.status}`.toLowerCase().includes(q)) &&
    (!s || o.status === s)
  );

  const tableDiv = document.getElementById('tf-table-' + wid);
  const countDiv = document.getElementById('tf-count-' + wid);
  if (tableDiv) tableDiv.innerHTML = buildTableHTML(data.slice(0, limit), cols, headerBg, fontSize);
  if (countDiv) countDiv.textContent = `Showing ${Math.min(limit, data.length)} of ${data.length} orders`;
}

function buildTableHTML(data, cols, headerBg, fontSize) {
  return `
    <table class="widget-table">
      <thead>
        <tr>${cols.map(c => `<th style="background:${headerBg}">${c.replace(/_/g,' ')}</th>`).join('')}</tr>
      </thead>
      <tbody>
        ${data.length
          ? data.map(o => `<tr>${cols.map(c => `<td style="font-size:${fontSize}px">${
              c === 'status'
                ? `<span class="badge badge-${o[c]}">${o[c]}</span>`
                : c === 'total_amount' || c === 'unit_price'
                  ? '₹' + parseFloat(o[c] || 0).toFixed(2)
                  : c === 'created_at'
                    ? new Date(o[c]).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
                    : (o[c] !== undefined ? o[c] : '—')
            }</td>`).join('')}</tr>`).join('')
          : `<tr><td colspan="${cols.length}" style="text-align:center;padding:20px;color:var(--text-muted)">No results found</td></tr>`
        }
      </tbody>
    </table>
  `;
}
// ── Empty state ───────────────────────────────────────────────────────────────
function showEmptyState() {
  document.getElementById('dashboardContent').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">📊</div>
      <h2>No widgets configured</h2>
      <p>Go to Configure Dashboard to select<br>the widgets you want to see here.</p>
      <a href="/configure/" class="btn btn-primary">⚙️ Configure Dashboard</a>
    </div>
  `;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function kpiColor(i) {
  return ['var(--success)', 'var(--accent)', 'var(--warning)', '#8b5cf6'][i % 4];
}

function getChartSubtitle(cfg) {
  if (cfg.type === 'pie_chart') return 'Grouped by ' + (cfg.chartData || 'status');
  if (cfg.xAxis && cfg.yAxis) return cfg.xAxis + ' vs ' + cfg.yAxis;
  return '';
}

function toggleSidebar() {
  document.querySelector('.sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('show');
}
function closeSidebar() {
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
}
function toggleTheme() {
  const isLight = document.body.classList.contains('light');
  if (isLight) {
    document.body.classList.remove('light');
    localStorage.setItem('theme', 'dark');
  } else {
    document.body.classList.add('light');
    localStorage.setItem('theme', 'light');
  }
}

function loadTheme() {
  if (localStorage.getItem('theme') === 'light') {
    document.body.classList.add('light');
  }
}

loadTheme();

</script>
</body>
</html>
