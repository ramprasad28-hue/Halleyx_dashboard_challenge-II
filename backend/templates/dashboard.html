{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/gridstack@9.2.0/dist/gridstack.min.css" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/gridstack@9.2.0/dist/gridstack-all.js"></script>

<style>

body{
    background:#f4f6f9;
    font-family:Arial;
    margin:0;
}

.navbar{
    background:#1f2937;
    padding:15px 30px;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin-right:25px;
    font-weight:bold;
}

.dashboard-container{
    padding:30px;
}

.grid-stack-item-content{
    background:white;
    border-radius:10px;
    padding:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
    text-align: center;
}
.grid-stack-item-content h3{
    color:#6b7280;
    font-size: 14px;
}
.grid-stack-item-content p{
    font-size: 28px;
    font-weight: bold;
    margin-top: 8px;
}

.kpi{
    font-size:28px;
    font-weight:bold;
    margin-top:10px;
}

h3{
    margin:0;
    color:#555;
}

canvas{
    width:fit-content !important;
}
.gird-stack{
    margin-top: 20px;
}
#revenue,#orders,#avg{
    font-size: 28px;
    font-weight: bold;
    margin-top: 10px;
}
button{
    background: #2563eb;
    color:white;
    border:none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    margin-left: 10px;
    align-items: center;
}
button:hover{
    background: rgb(7, 92, 102);
}

</style>
</head>

<body>
<div style="background:#1f2937;padding:15px;color:white;display:flex;justify-content:space-between;">
<div style="font-weight:bold;font-size:18px;">
        Halleyx Dashboard
    </div>

    <div>
        <a href="/dashboard/" style="color:white;margin-right:20px;text-decoration:none;">Dashboard</a>
        <a href="/orders/" style="color:white;text-decoration:none;">Orders</a>
    </div>
</div>
<!-- <label for="dateFilter">Show data for:</label> -->
<!-- 
<select id="dateFilter">
    <option value="all">All time</option>
    <option value="today">Today</option>
    <option value="7">Last 7 days</option>
    <option value="30">Last 30 days</option>
    <option value="90">Last 90 days</option>
</select> -->
<br>
<button onclick="toggleEdit()">Configure Dashboard</button>
<br>
<div class="grid-stack">

<div class="grid-stack-item" gs-w="4" gs-h="2">
<div class="grid-stack-item-content">

<h3>Total Revenue</h3>
<p id="revenue" class="kpi">0</p>

</div>
</div>

<div class="grid-stack-item" gs-w="4" gs-h="2">
<div class="grid-stack-item-content">

<h3>Total Orders</h3>
<p id="orders" class="kpi">0</p>

</div>
</div>

<div class="grid-stack-item" gs-w="4" gs-h="2">
<div class="grid-stack-item-content">

<h3>Average Order Value</h3>
<p id="avg" class="kpi">0</p>

</div>
</div>

<div class="grid-stack-item" gs-w="6" gs-h="4">
<div class="grid-stack-item-content">
    
    <canvas id="productChart"></canvas>
    
</div>
</div>

<div class="grid-stack-item" gs-w="6" gs-h="4">
    <div class="grid-stack-item-content">
        
        <canvas id="statusChart"></canvas>
        
    </div>
</div>

</div>
<script>
    
document.addEventListener("DOMContentLoaded", function () {

    const grid = GridStack.init({
        column: 12,
        cellHeight: 80,
        float: true
    });

    grid.on('change', function(){

        const layout = grid.save();

        fetch("/api/save-layout/",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(layout)
        });

    });

});
let editMode = false;

function toggleEdit(){

    editMode = !editMode;
    
    const grid = document.querySelector('.grid-stack').gridstack;
    
    if(editMode){
        grid.enableMove(true);
        grid.enableResize(true);
        alert("Dashboard edit mode enabled");
    } else {
        grid.enableMove(false);
        grid.enableResize(false);
        alert("Dashboard locked");
    }
    
}





</script>
<script src="{% static 'js/dashboard.js' %}"></script>



</body>
</html>
